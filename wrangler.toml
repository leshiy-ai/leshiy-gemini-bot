name = "leshiy-gemini-bot"
main = "worker.js"
compatibility_date = "2025-12-15" # Дата, которую мы добавили в deploy.yml

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

# [vars] - Здесь обычные переменные окружения, которые не являются секретами
[vars]
DEBUG_CHAT_ID = "235663624"
ADMIN_CHAT_ID = "235663624"
DEBUG_ENABLED = "true"
TTS_ENABLED = "true"
PHOTO_ENABLED = "true"
VIDEO_ENABLED = "true"
LESHIY_RENDER_HOST = "https://leshiy-media-converter.onrender.com"
WORKER_DOMAIN = "https://leshiy-gemini-bot.leshiyalex.workers.dev"

[secrets]
# Здесь Wrangler будет искать СЕКРЕТЫ, которые вы настроили
# Он автоматически сопоставит их с env.TELEGRAM_BOT_TOKEN и env.GEMINI_API_KEY
# Вам не нужно указывать их значения здесь, только имена.
# API-ключи из секретных переменных
TELEGRAM_BOT_TOKEN = ""
GEMINI_API_KEY = ""
GEMINI_PROXY_KEY = ""
GROK_API_KEY = ""
DEEPSEEK_API_KEY = ""
BOTHUB_API_KEY = ""
KIEAI_API_KEY = ""
CLOUDFLARE_ACCOUNT_ID = ""
CLOUDFLARE_API_TOKEN = ""
FUSIONBRAIN_API_KEY = ""
FUSIONBRAIN_SECRET_KEY = ""
VOICERSS_API_KEY = ""
OPENAI_API_KEY = ""
OPENROUTER_API_KEY = ""
RUNWAY_API_KEY = ""
MODELSLAB_API_KEY = ""
FREEPIK_API_KEY = ""
STABILITY_API_KEY = ""

# [[kv_namespaces]] - Здесь Привязки KV LAST_PHOTO_STORAGE
[[kv_namespaces]]
binding = "LAST_PHOTO_STORAGE"
id = "65ea2c9829024c618eaa90e17ebf5682" 
# [[kv_namespaces]] - Здесь Привязка для хранения истории чата
[[kv_namespaces]]
binding = "CHAT_HISTORY_STORAGE"
id = "b705c798e7c44e19aa880047fa154681"
# ID вашего хранилища нужно скопировать из Cloudflare Dashboard.

[[services]]
binding = "LESHIY_AI_PROXY"    # Имя переменной в коде бота (env.LESHIY_AI_PROXY)
service = "leshiy-ai-proxy"    # Имя второго воркера в панели Cloudflare

[[services]]
binding = "GEMINI_PROXY" # Имя переменной, которая будет доступна в env
service = "gemini-proxy" # Точное имя (ID) твоего прокси-воркера в Cloudflare

# [ai] - для Workers AI
[ai]
binding = "AI"
