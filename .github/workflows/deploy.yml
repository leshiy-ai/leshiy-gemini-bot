name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main # Развертывать при коммите в ветку 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker using Cloudflare Action
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          quiet: false
          # Укажите ТОЧНОЕ ИМЯ ВАШЕГО WORKER'А в Cloudflare Dashboard
          command: deploy --name gemini-photo-bot worker.js
