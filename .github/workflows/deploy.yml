name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Устанавливаем Node.js (необходимо для npx и Wrangler)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Устанавливаем Wrangler (фиксируем на стабильной v4)
      - name: Install Wrangler
        run: npm install -g wrangler@4

      # 3. Запускаем развертывание напрямую (через команду run)
      #    Это гарантирует, что переменные окружения будут переданы
      - name: Deploy Worker
        run: wrangler deploy --name gemini-photo-bot worker.js --compatibility-date 2025-12-15
        # Здесь Wrangler ищет CLOUDFLARE_API_TOKEN и CLOUDFLARE_ACCOUNT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
