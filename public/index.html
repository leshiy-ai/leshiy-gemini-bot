<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini-AI</title>
    <style>
        :root {
            --bg-main: #1a1a2e;
            --bg-header: #16213e;
            --bg-input: #0f3460;
            --bg-msg-bot: #2d2d44;
            --accent: #a855f7;
            --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-main); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; }
        
        /* Header */
        .header { padding: 15px; background: var(--bg-header); text-align: center; font-size: 20px; font-weight: bold; color: var(--accent); border-bottom: 1px solid #2d2d44; }
        
        /* Tabs */
        .tabs { display: flex; background: var(--bg-header); border-bottom: 1px solid #2d2d44; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #aaa; transition: 0.3s; font-size: 14px; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        /* Chat Area */
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.4; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .msg.bot { align-self: flex-start; background: var(--bg-msg-bot); border-bottom-left-radius: 4px; }
        
        /* Input Area */
        .input-area { padding: 15px; background: var(--bg-header); display: flex; gap: 10px; border-top: 1px solid #2d2d44; }
        input { flex: 1; padding: 12px 16px; border-radius: 24px; border: none; background: var(--bg-input); color: white; font-size: 16px; outline: none; }
        input::placeholder { color: #888; }
        button { width: 48px; height: 48px; border-radius: 50%; border: none; background: var(--accent); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        button:active { transform: scale(0.9); }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">✨ Gemini-AI</div>
        
        <div class="tabs">
            <div class="tab active" onclick="setMode('chat')">Чат</div>
            <div class="tab" onclick="setMode('image')">Изображение</div>
            <div class="tab" onclick="setMode('video')">Видео</div>
        </div>

        <div class="messages" id="chatBox">
            <div class="msg bot">Привет! Я Gemini-AI. Напиши мне что-нибудь, и я отвечу.</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Написать сообщение..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let currentMode = 'chat';
        const API_URL = '/api/chat'; // Запрос пойдет на тот же домен!

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const input = document.getElementById('userInput');
            if (mode === 'image') input.placeholder = 'Опиши изображение...';
            else if (mode === 'video') input.placeholder = 'Опиши видео...';
            else input.placeholder = 'Написать сообщение...';
        }

        // Отправка по Enter
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerText = '⏳';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, mode: currentMode })
                });
                
                const data = await response.json();
                addMessage(data.reply || data.error || 'Пустой ответ', 'bot');
            } catch (err) {
                addMessage('Ошибка сети: ' + err.message, 'bot');
            } finally {
                btn.disabled = false;
                btn.innerText = '➤';
            }
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
