<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Авторизация Telegram — Pixel-AI</title>
    <style>
        body { 
            background: #212121; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: sans-serif; 
        }
        .auth-card {
            background: white; 
            padding: 32px 24px; 
            border-radius: 28px; 
            width: 360px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .auth-card .logo { width: 100px; height: 100px; margin: 0 auto 20px auto; }
        .auth-card .title { font: 700 20px sans-serif; margin-bottom: 8px; color: #000; }
        .auth-card .subtitle { font: 400 14px sans-serif; color: #818c99; margin-bottom: 24px; line-height: 1.4; }
        .tg-btn {
            display: block; width: 100%; padding: 14px 0; background: #0088cc;
            color: white; text-decoration: none; border-radius: 12px; font-size: 16px;
            font-weight: 600; box-sizing: border-box; border: none; cursor: pointer;
            text-align: center;
        }
        .tg-btn:hover { background: #0077b3; }
        .later-btn {
            width: 100%; margin-top: 15px; border: none; background: none; 
            color: #0088cc; cursor: pointer; font-size: 14px;
        }
        .auto-login-msg {
            font: 400 14px sans-serif; color: #4caf50; margin-bottom: 16px;
            padding: 10px; background: #e8f5e9; border-radius: 8px;
        }
    </style>
    <!-- Telegram WebApp SDK — нужен для initData внутри TG Mini App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const returnToFromUrl = urlParams.get('returnTo') || urlParams.get('auth_origin') || '';
        
        if (returnToFromUrl) localStorage.setItem('tg_return_to', returnToFromUrl);
        window.authReturnTo = returnToFromUrl || localStorage.getItem('tg_return_to') || '/';
        
        if (window.authReturnTo && window.authReturnTo !== '/') {
            try {
                window.authCancelTo = new URL(window.authReturnTo).origin + '/';
            } catch(e) {
                window.authCancelTo = window.authReturnTo;
            }
        } else {
            window.authCancelTo = '/'; 
        }
    </script>
</head>
<body>
    <div id="auth_card" class="auth-card">
        <div class="logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
                <defs>
                    <linearGradient id="gemini-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#7c3aed"/>
                        <stop offset="50%" style="stop-color:#a855f7"/>
                        <stop offset="100%" style="stop-color:#c084fc"/>
                    </linearGradient>
                </defs>
                <path d="M50 0C50 0 53 47 100 50C100 50 53 53 50 100C50 100 47 53 0 50C0 50 47 47 50 0Z" fill="url(#gemini-grad)"/>
            </svg>
        </div>
        <div class="title">🔐 Вход в Pixel-AI</div>
        <div class="subtitle" id="authSubtitle">Определяем платформу...</div>
        
        <div id="authContent">
            <!-- Заполняется динамически в зависимости от контекста -->
        </div>
        
        <button onclick="window.location.replace(window.authCancelTo)" class="later-btn">Позже</button>
    </div>

    <script>
        const returnTo = window.authReturnTo;
        const tgId = urlParams.get('id');
        const tgUserId = urlParams.get('tg_user_id');
        const tgFirstName = urlParams.get('first_name');
        const tgLastName = urlParams.get('last_name') || '';
        const tgUsername = urlParams.get('username') || '';
        const tgHash = urlParams.get('hash');
        const tgPhotoUrl = urlParams.get('photo_url');

        const GEMINI_LOGO_SVG = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
            <defs><linearGradient id="gemini-grad-ok" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#7c3aed"/><stop offset="50%" style="stop-color:#a855f7"/><stop offset="100%" style="stop-color:#c084fc"/>
            </linearGradient></defs>
            <path d="M50 0C50 0 53 47 100 50C100 50 53 53 50 100C50 100 47 53 0 50C0 50 47 47 50 0Z" fill="url(#gemini-grad-ok)"/>
        </svg>`;

        // ============================================================
        //  КЛЮЧЕВАЯ ФУНКЦИЯ: сохранить юзера и показать кнопку возврата
        // ============================================================
        function redirectWithTgId(userId, userName, userPhoto, hash, initData) {
            localStorage.removeItem('tg_return_to');

            localStorage.setItem('tg_user_id', String(userId));
            localStorage.setItem('vk_user_id', String(userId)); // Единый ключ
            localStorage.setItem('auth_provider', 'Telegram');
            if (userName) localStorage.setItem('vk_user_name', userName);
            if (userPhoto) localStorage.setItem('vk_user_photo', userPhoto);
            if (tgUsername) localStorage.setItem('tg_username', tgUsername);
            if (initData) localStorage.setItem('tg_init_data', initData);
            localStorage.setItem('gemini_user', JSON.stringify({
                id: String(userId),
                name: userName || 'TG User',
                provider: 'tg',
                hash: hash || null,
                photo: userPhoto || '',
                initData: initData || null
            }));

            // Конструируем URL возврата
            let targetUrl = '/';
            try {
                const domainRoot = returnTo && returnTo !== '/' 
                    ? new URL(returnTo).origin 
                    : window.location.origin;
                const p = new URLSearchParams();
                p.set('tg_user_id', String(userId));
                if (userName) p.set('tg_user_name', userName);
                if (userPhoto) p.set('tg_user_photo', userPhoto);
                if (hash) p.set('tg_hash', hash);
                targetUrl = `${domainRoot}/?${p.toString()}`;
            } catch(e) {
                const base = returnTo || '/';
                const sep = base.includes('?') ? '&' : '?';
                targetUrl = `${base}${sep}tg_user_id=${userId}`;
                if (userName) targetUrl += `&tg_user_name=${encodeURIComponent(userName)}`;
                if (userPhoto) targetUrl += `&tg_user_photo=${encodeURIComponent(userPhoto)}`;
            }

            // Показываем экран успеха
            document.getElementById('auth_card').innerHTML = `
                <div class="logo">${GEMINI_LOGO_SVG}</div>
                <div style="font: 700 22px sans-serif; margin-bottom: 8px; color: #000;">✅ Авторизация успешна!</div>
                <div style="font: 400 14px sans-serif; color: #818c99; margin-bottom: 30px; line-height: 1.4;">
                    Нажмите кнопку ниже, чтобы вернуться в приложение
                </div>
                <a href="${targetUrl}" class="tg-btn">Вернуться в приложение</a>
            `;
        }

        // ============================================================
        //  СЦЕНАРИЙ 0: Мы внутри Telegram Mini App — авторизация автоматом!
        //  Telegram.WebApp.initDataUnsafe.user содержит данные юзера
        // ============================================================
        const isTgMiniApp = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData;
        
        if (isTgMiniApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
            // Инициализируем TG Mini App
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            
            const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
            const userName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') || tgUser.username || 'TG User';
            const userPhoto = tgUser.photo_url || '';
            const initData = window.Telegram.WebApp.initData;
            
            document.getElementById('authSubtitle').textContent = 'Telegram определён — авторизуем автоматически...';
            
            // Автоматически авторизуем и редиректим
            redirectWithTgId(String(tgUser.id), userName, userPhoto, null, initData);
        }
        // ============================================================
        //  СЦЕНАРИЙ 1: Возврат с id+hash от TG Login Widget (с обычного сайта)
        // ============================================================
        else if (tgId && tgHash) {
            const userName = [tgFirstName, tgLastName].filter(Boolean).join(' ') || tgUsername || '';
            const userPhoto = tgPhotoUrl || '';
            redirectWithTgId(tgId, userName, userPhoto, tgHash, null);
        }
        // ============================================================
        //  СЦЕНАРИЙ 2: Возврат с tg_user_id (из внешнего редиректа)
        // ============================================================
        else if (tgUserId) {
            const userName = urlParams.get('tg_user_name') || urlParams.get('tg_username') || '';
            const userPhoto = urlParams.get('tg_user_photo') || '';
            const hash = urlParams.get('tg_hash') || null;
            redirectWithTgId(tgUserId, userName, userPhoto, hash, null);
        }
        // ============================================================
        //  СЦЕНАРИЙ 3: Мы внутри TG Mini App, но initDataUnsafe.user пустой
        //  (редкий кейс — показываем кнопку "Войти" через MainButton)
        // ============================================================
        else if (isTgMiniApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            
            document.getElementById('authSubtitle').textContent = 'Нажмите кнопку для авторизации через Telegram';
            document.getElementById('authContent').innerHTML = `
                <div class="auto-login-msg">✅ Вы в Telegram Mini App — нажмите кнопку ниже</div>
                <button class="tg-btn" onclick="loginViaTgMainButton()">Войти через Telegram</button>
            `;
            
            function loginViaTgMainButton() {
                const tg = window.Telegram.WebApp;
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    const u = tg.initDataUnsafe.user;
                    const name = [u.first_name, u.last_name].filter(Boolean).join(' ') || u.username || 'TG User';
                    redirectWithTgId(String(u.id), name, u.photo_url || '', null, tg.initData);
                } else {
                    // initDataUnsafe пустой — используем initData напрямую
                    // Отправляем initData на бэкенд для валидации
                    document.getElementById('authSubtitle').textContent = 'Проверяем данные...';
                    fetch(window.location.origin + '/api', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            mode: 'validate_init_data', 
                            auth: { provider: null, id: null }, 
                            payload: { init_data: tg.initData } 
                        })
                    })
                    .then(r => r.json())
                    .then(result => {
                        if (result.success && result.data && result.data.user) {
                            const u = result.data.user;
                            redirectWithTgId(u.id, u.name, u.photo_url || '', null, tg.initData);
                        } else {
                            document.getElementById('authSubtitle').textContent = 'Ошибка авторизации. Попробуйте позже.';
                            document.getElementById('authContent').innerHTML = '';
                        }
                    })
                    .catch(err => {
                        console.error('Validate error:', err);
                        document.getElementById('authSubtitle').textContent = 'Ошибка подключения. Попробуйте позже.';
                    });
                }
            }
        }
        // ============================================================
        //  СЦЕНАРИЙ 4: Обычный браузер — показываем TG Login Widget
        // ============================================================
        else {
            document.getElementById('authSubtitle').textContent = 'Используйте Telegram для безопасного доступа';
            
            const widgetScript = document.createElement('script');
            widgetScript.src = 'https://telegram.org/js/telegram-widget.js?22';
            widgetScript.setAttribute('data-telegram-login', 'gemini_aitg_bot');
            widgetScript.setAttribute('data-size', 'large');
            widgetScript.setAttribute('data-auth-url', `${window.location.origin}/tg.html`);
            widgetScript.setAttribute('data-request-access', 'write');
            widgetScript.async = true;
            document.getElementById('authContent').appendChild(widgetScript);
        }
    </script>
</body>
</html>
